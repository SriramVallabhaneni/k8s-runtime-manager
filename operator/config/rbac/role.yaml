---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - persistentvolumeclaims
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - runtime.airuntime.dev
  resources:
  - aimodeldeployments
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - runtime.airuntime.dev
  resources:
  - aimodeldeployments/finalizers
  verbs:
  - update
- apiGroups:
  - runtime.airuntime.dev
  resources:
  - aimodeldeployments/status
  verbs:
  - get
  - patch
  - update
